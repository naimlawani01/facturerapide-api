name: CI — Tests & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: facturerapide_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/facturerapide_test
      DATABASE_URL_SYNC: postgresql+psycopg://postgres:postgres@localhost:5432/facturerapide_test
      SECRET_KEY: ci-test-secret-key-minimum-32-characters-long
      ENVIRONMENT: testing
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Check service exists and deploy
        run: |
          if railway service link facturerapide-api 2>/dev/null; then
            echo "✅ Service found. Deploying..."
            railway up --service facturerapide-api --detach
          else
            echo "⚠️ Service 'facturerapide-api' not found."
            echo "👉 Run the 'Setup Railway Infrastructure' workflow first (Actions > Setup Railway Infrastructure > Run workflow)."
            echo "Skipping deploy."
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
