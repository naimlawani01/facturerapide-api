name: Setup Railway Infrastructure

on:
  workflow_dispatch:

jobs:
  provision:
    name: Configure Railway Services
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Configure Railway services
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # With a project token, Railway CLI already knows the project.
          # Do NOT use "railway init" — it creates a new project and breaks the token scope.

          echo "📌 Checking project access..."
          railway status || { echo "❌ Cannot access project. Check RAILWAY_TOKEN (must be a project token)."; exit 1; }
          echo ""

          # Link to backend service
          echo "🔗 Linking to facturerapide-api..."
          railway service link facturerapide-api || { echo "❌ Service 'facturerapide-api' not found. Create it from the Railway dashboard first."; exit 1; }
          echo ""

          # Configure environment variables
          echo "📝 Setting environment variables..."
          SECRET_KEY=$(openssl rand -hex 32)
          DB_REF='${{ '{{' }}Postgres.DATABASE_URL{{ '}}' }}'
          railway variables set \
            "ENVIRONMENT=production" \
            "DEBUG=false" \
            "APP_NAME=FactureRapide API" \
            "APP_VERSION=1.0.0" \
            "DATABASE_URL=${DB_REF}" \
            "DATABASE_URL_SYNC=${DB_REF}" \
            "SECRET_KEY=${SECRET_KEY}" \
            "ALGORITHM=HS256" \
            "ACCESS_TOKEN_EXPIRE_MINUTES=30" \
            "REFRESH_TOKEN_EXPIRE_DAYS=7" \
            'CORS_ORIGINS=["*"]' \
            "PDF_STORAGE_PATH=./storage/invoices" \
            "PDF_RECEIPTS_PATH=./storage/receipts" \
            "HOST=0.0.0.0" \
            "PORT=8000"
          echo ""

          # Generate public domain (if not already set)
          echo "🌐 Generating public domain..."
          railway domain || echo "⚠️ Domain may already exist"
          echo ""

          # Summary
          echo "✅ Railway configuration complete!"
          echo ""
          railway status
          echo ""
          echo "📋 Variables set on facturerapide-api:"
          railway variables
