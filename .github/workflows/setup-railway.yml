name: Setup Railway Infrastructure

on:
  workflow_dispatch:
    inputs:
      railway_project:
        description: "Nom du projet Railway"
        required: true
        default: facturerapide

jobs:
  provision:
    name: Create & Configure Railway Services
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Provision Railway infrastructure
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          # Account/workspace token (RAILWAY_API_TOKEN) — required for creating services
          echo "📌 Linking to project '${{ inputs.railway_project }}'..."
          railway link -p "${{ inputs.railway_project }}" || { echo "❌ Cannot link to project. Check RAILWAY_API_TOKEN and project name."; exit 1; }
          echo ""

          # Create PostgreSQL if it doesn't exist
          echo "🗄️ Adding PostgreSQL..."
          railway add --database postgres || echo "⚠️ PostgreSQL may already exist, continuing..."
          echo ""

          # Create backend service linked to GitHub repo
          SERVICE_NAME="${{ github.event.repository.name }}"
          echo "⚙️ Creating backend service '${SERVICE_NAME}'..."
          railway add \
            --service "${SERVICE_NAME}" \
            --repo "${{ github.repository }}" || echo "⚠️ Service may already exist, continuing..."
          echo ""

          # Link to backend service for variable/domain commands
          echo "🔗 Linking to service '${SERVICE_NAME}'..."
          railway service link "${SERVICE_NAME}" || { echo "❌ Could not link to service '${SERVICE_NAME}'."; exit 1; }
          echo ""

          # Configure environment variables
          echo "📝 Setting environment variables..."
          SECRET_KEY=$(openssl rand -hex 32)
          DB_REF='$${{ '{{' }}Postgres.DATABASE_URL${{ '}}' }}'
          railway variables set \
            "ENVIRONMENT=production" \
            "DEBUG=false" \
            "APP_NAME=FactureRapide API" \
            "APP_VERSION=1.0.0" \
            "DATABASE_URL=${DB_REF}" \
            "DATABASE_URL_SYNC=${DB_REF}" \
            "SECRET_KEY=${SECRET_KEY}" \
            "ALGORITHM=HS256" \
            "ACCESS_TOKEN_EXPIRE_MINUTES=30" \
            "REFRESH_TOKEN_EXPIRE_DAYS=7" \
            'CORS_ORIGINS=["*"]' \
            "PDF_STORAGE_PATH=./storage/invoices" \
            "PDF_RECEIPTS_PATH=./storage/receipts" \
            "HOST=0.0.0.0" \
            "PORT=8000"
          echo ""

          # Generate public domain
          echo "🌐 Generating public domain..."
          railway domain || echo "⚠️ Domain may already exist"
          echo ""

          # Summary
          echo "✅ Railway configuration complete!"
          echo ""
          railway status
          echo ""
          echo "📋 Variables set on ${SERVICE_NAME}:"
          railway variables
