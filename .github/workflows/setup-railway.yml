name: Setup Railway Infrastructure

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "Railway project name"
        required: true
        default: "facturerapide"

jobs:
  provision:
    name: Create Railway Services
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Create Railway project
        run: |
          echo "🚀 Creating Railway project: ${{ github.event.inputs.project_name }}"
          railway init --name "${{ github.event.inputs.project_name }}" || echo "Project may already exist, continuing..."
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Add PostgreSQL database
        run: |
          echo "🗄️ Adding PostgreSQL..."
          railway add --database postgres || echo "PostgreSQL may already exist, continuing..."
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Create backend service linked to GitHub repo
        run: |
          echo "⚙️ Creating backend service..."
          railway add \
            --service "facturerapide-api" \
            --repo "naimlawani01/facturerapide-api" || echo "Service may already exist, continuing..."
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Link to backend service
        run: railway service link facturerapide-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Configure environment variables
        run: |
          echo "📝 Setting environment variables..."
          SECRET_KEY=$(openssl rand -hex 32)
          DB_REF='${{ '{{' }}Postgres.DATABASE_URL{{ '}}' }}'
          railway variables set \
            "ENVIRONMENT=production" \
            "DEBUG=false" \
            "APP_NAME=FactureRapide API" \
            "APP_VERSION=1.0.0" \
            "DATABASE_URL=${DB_REF}" \
            "DATABASE_URL_SYNC=${DB_REF}" \
            "SECRET_KEY=${SECRET_KEY}" \
            "ALGORITHM=HS256" \
            "ACCESS_TOKEN_EXPIRE_MINUTES=30" \
            "REFRESH_TOKEN_EXPIRE_DAYS=7" \
            'CORS_ORIGINS=["*"]' \
            "PDF_STORAGE_PATH=./storage/invoices" \
            "PDF_RECEIPTS_PATH=./storage/receipts" \
            "HOST=0.0.0.0" \
            "PORT=8000"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Generate public domain
        run: |
          echo "🌐 Generating public domain..."
          railway domain
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Show project info
        run: |
          echo "✅ Railway infrastructure ready!"
          echo ""
          railway status
          echo ""
          echo "📋 Variables set on facturerapide-api:"
          railway variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
